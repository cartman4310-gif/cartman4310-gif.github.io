<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperdrive Control Center - Login</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 380px;
            padding: 40px;
            border: 2px solid #238636;
            border-radius: 10px;
            background-color: #161b22;
            box-shadow: 0 0 20px rgba(35, 134, 54, 0.5);
            box-sizing: border-box;
        }
        h1 { 
            color: #2ea44f; 
            margin-bottom: 20px; 
            text-align: center;
            font-size: 1.8em;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            color: #8b949e;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 1em;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 5px rgba(88, 166, 255, 0.3);
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #238636;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }
        .btn:hover { 
            background-color: #2ea44f; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HYPERDRIVE LOGIN</h1>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Identifikations-ID (Nutzername)</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Zugriffscode (Passwort)</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn">Authentifizieren</button>
        </form>
    </div>
</body>
</html>
