<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperdrive Control Center</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #238636;
            border-radius: 10px;
            background-color: #161b22;
            box-shadow: 0 0 20px rgba(35, 134, 54, 0.5);
        }
        h1 { color: #2ea44f; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 1.1em; }
        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #2ea44f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYSTEM OVERRIDE: ERFOLGREICH</h1>
        <p>Willkommen auf meiner offiziellen, via Bash-Script verlinkten Webseite!</p>
        <p>Gehostet im globalen Github-Grid.</p>
        <a href="https://github.com" class="btn">Mein Profil ansehen</a>
    </div>
</body>
</html>
